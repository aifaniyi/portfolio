name: Build and Deploy to S3

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

# Allow only one concurrent deployment
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Default permissions (read-only)
permissions:
  contents: read
  id-token: write # Required for OIDC authentication with AWS

jobs:
  build:
    name: Build Application
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run linter
        run: npm run lint
      
      - name: Run build
        run: npm run build
        env:
          NODE_ENV: production
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  deploy:
    name: Deploy to S3
    needs: build
    runs-on: ubuntu-latest
    # Only deploy on push to main/master, not on PRs
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}
          role-session-name: GitHubActions-${{ github.run_id }}
      
      # Alternative: Use Access Keys (less secure, comment out OIDC step above if using this)
      # - name: Configure AWS credentials (Access Keys)
      #   uses: aws-actions/configure-aws-credentials@v4
      #   with:
      #     aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
      #     aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      #     aws-region: ${{ secrets.AWS_REGION }}
      
      - name: Sync files to S3
        run: |
          aws s3 sync dist/ s3://${{ secrets.S3_BUCKET_NAME }}/portfolio/ \
            --delete \
            --cache-control "public,max-age=31536000,immutable" \
            --exclude "*.html" \
            --exclude "*.json" \
            --exclude "*.xml" \
            --exclude "*.txt"
          
          # HTML files with shorter cache (1 hour)
          aws s3 sync dist/ s3://${{ secrets.S3_BUCKET_NAME }}/portfolio/ \
            --cache-control "public,max-age=3600,must-revalidate" \
            --exclude "*" \
            --include "*.html"
          
          # Metadata files with no cache
          aws s3 sync dist/ s3://${{ secrets.S3_BUCKET_NAME }}/portfolio/ \
            --cache-control "no-cache,no-store,must-revalidate" \
            --exclude "*" \
            --include "*.json" \
            --include "*.xml" \
            --include "*.txt"
      
      - name: Invalidate CloudFront cache (if using CloudFront)
        if: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID != '' }}
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/portfolio/*"
      
      - name: Deployment summary
        run: |
          echo "✅ Deployment completed successfully!"
          echo "🌐 Bucket: s3://${{ secrets.S3_BUCKET_NAME }}/portfolio/"
          echo "📦 Build artifacts synced"
          if [ -n "${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}" ]; then
            echo "🔄 CloudFront cache invalidated"
          fi
